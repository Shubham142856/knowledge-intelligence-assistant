apiVersion: v1
kind: Namespace
metadata:
  name: vyor-ai
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
  namespace: vyor-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: vyor-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vyor-config
  namespace: vyor-ai
data:
  QDRANT_URL: "http://qdrant:6333"
  REDIS_URL: "redis://redis:6379/0"
  POSTGRES_DB: "vyor_knowledge"
  POSTGRES_USER: "knowledge"
  POSTGRES_URL: "postgresql://knowledge:knowledge123@postgres:5432/vyor_knowledge"
  API_URL: "http://vyor-api:8000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: vyor-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: vyor-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: vyor-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              value: "knowledge123"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vyor-ai
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: vyor-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vyor-ai
spec:
  ports:
    - port: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: vyor-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.9.0
          ports:
            - containerPort: 6333
            - containerPort: 6334
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: vyor-ai
spec:
  ports:
    - name: http
      port: 6333
    - name: grpc
      port: 6334
  selector:
    app: qdrant
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vyor-api
  namespace: vyor-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vyor-api
  template:
    metadata:
      labels:
        app: vyor-api
    spec:
      containers:
        - name: api
          image: vyor-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: vyor-config
          env:
            - name: OPENROUTER_API_KEY
              value: "YOUR_OPENROUTER_API_KEY_HERE"
          ports:
            - containerPort: 8000
            - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: vyor-api
  namespace: vyor-ai
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: streamlit
      port: 8501
      targetPort: 8501
  selector:
    app: vyor-api
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vyor-worker
  namespace: vyor-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vyor-worker
  template:
    metadata:
      labels:
        app: vyor-worker
    spec:
      containers:
        - name: worker
          image: vyor-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "src.tasks.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: vyor-config
          env:
            - name: OPENROUTER_API_KEY
              value: "YOUR_OPENROUTER_API_KEY_HERE"
